<div class="media-embed vimeo">
  <iframe
    width="848"
    height="477"
    title="{{ title }}"
    src="https://player.vimeo.com/video/{{ id }}"
    loading="lazy"
    referrerpolicy="strict-origin-when-cross-origin"
    allow="fullscreen; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>
