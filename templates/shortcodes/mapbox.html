<figure class="extended-visual">
  <div class="map" role="region" aria-label="{{ title }}"
    data-mapbox-token="{{ config.extra.mapbox.access_token }}"
    data-zoom="{{ zoom }}"
    data-geojson="{{ body }}"></div>
  {% if caption %}
  <figcaption>{{ caption }}</figcaption>
  {% endif %}
</figure>
